<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Jaron Radio</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #444 0, #111 60%);
            font-family: "Courier New", monospace;
            color: #eee;
        }

        .radio {
            width: 800px;
            height: 380px;
            background: #3b2b22;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            border: 6px solid #1b120e;
            position: relative;
            padding: 20px 30px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 2fr 1.2fr;
            grid-template-rows: auto 1fr auto;
            grid-template-areas:
                "dial controls"
                "screen buttons"
                "footer buttons";
            gap: 15px;
        }

        /* DIAL AREA */
        .dial {
            grid-area: dial;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f5e2b8;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 14px;
        }

        .dial-scale {
            flex: 1;
            height: 26px;
            border-radius: 16px;
            background: linear-gradient(90deg, #1b1b1b, #333);
            border: 2px solid #000;
            position: relative;
            overflow: hidden;
        }

        .dial-indicator {
            position: absolute;
            top: 2px;
            width: 4px;
            bottom: 2px;
            left: 0%;
            background: #ff4b4b;
            box-shadow: 0 0 6px #ff4b4b;
            transition: left 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* CONTROLS AREA */
        .controls {
            grid-area: controls;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .knob-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            text-transform: uppercase;
            color: #f5e2b8;
        }

        /* .volume-slider {
      -webkit-appearance: none;
      width: 160px;
      height: 8px;
      border-radius: 4px;
      background: #111;
      outline: none;
      border: 1px solid #555;
      cursor: pointer;
    } */

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #f5e2b8;
            border: 2px solid #000;
        }

        /* SCREEN AREA */
        .screen {
            grid-area: screen;
            background: #0a0a0a;
            border-radius: 12px;
            border: 4px solid #000;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 1);
            overflow: hidden;
            position: relative;
        }

        .screen-header {
            position: absolute;
            top: 6px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #8fffa8;
            text-transform: uppercase;
            z-index: 10;
            text-shadow: 0 0 5px #0f0;
            pointer-events: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0.9;
        }

        /* BUTTONS AREA */
        .buttons {
            grid-area: buttons;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            overflow-y: auto;
            padding: 5px;
        }

        .station-btn {
            height: 45px;
            border-radius: 6px;
            border: 2px solid #000;
            background: linear-gradient(to bottom, #d9d0c0, #a89b86);
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
            transition: all 0.1s;
        }

        .station-btn.active {
            background: #ffe9a6;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4);
            transform: translateY(2px);
        }

        /* FOOTER AREA */
        .footer {
            grid-area: footer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: #c9b89a;
        }

        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #300;
        }

        .led.on {
            background: #3f0;
            box-shadow: 0 0 10px #7f0;
        }
    </style>
</head>

<body>

    <div class="radio">
        <div class="dial">
            <span>FM</span>
            <div class="dial-scale">
                <div class="dial-indicator" id="dialIndicator"></div>
            </div>
            <span>📻 Jaron Radio 📻</span>
        </div>

        <div class="screen">
            <div class="screen-header" id="screenHeader">Standby... Select Station</div>
            <iframe id="apiFrame"></iframe>
        </div>

        <div class="buttons" id="buttonsContainer"></div>

        <div class="footer">
            <div class="led" id="powerLed"></div>
            <span id="statusText">Select Channel (CHxx) and press play </span>
        </div>
    </div>

    <audio id="radioAudio" loop></audio>
    <script>

        let apiStations = [];
        let isPowerOn = false;

        // Global DOM references
        let radioAudio, powerLed, statusText, screenHeader, dialIndicator, apiFrame;

        // Load JSON first
        fetch("apiStationList.json")
            .then(response => response.json())
            .then(data => {
                apiStations = data.stations;
                console.log("Loaded stations:", apiStations);
                initDom();
                buildButtons();
            })
            .catch(err => console.error("Error loading JSON:", err));

        function initDom() {
            // Assign DOM elements globally
            apiFrame = document.getElementById("apiFrame");
            powerLed = document.getElementById("powerLed");
            statusText = document.getElementById("statusText");
            radioAudio = document.getElementById("radioAudio");
            screenHeader = document.getElementById("screenHeader");
            dialIndicator = document.getElementById("dialIndicator");
        }

        function buildButtons() {
            const buttonsContainer = document.getElementById("buttonsContainer");

            apiStations.forEach((url, index) => {
                const btn = document.createElement("button");
                btn.className = "station-btn";
                btn.textContent = "CH " + (index + 1);

                btn.onclick = () => tuneToStation(index);

                buttonsContainer.appendChild(btn);
            });
        }

        async function tuneToStation(index) {

            // Highlight active button
            document.querySelectorAll('.station-btn').forEach((b, i) => {
                b.classList.toggle('active', i === index);
            });

            // Move dial safely
            if (dialIndicator) {
                const percent = (index / (apiStations.length - 1)) * 100;
                dialIndicator.style.left = percent + "%";
            }

            // Update screen
            screenHeader.textContent = "Tuning... CH " + (index + 1);
            apiFrame.src = apiStations[index];

            // Power on audio
            if (!isPowerOn) {
                try {
                    await radioAudio.play();
                    isPowerOn = true;
                    powerLed.classList.add("on");
                } catch (e) {
                    statusText.textContent = "Click again to allow audio";
                }
            }

            statusText.textContent = "Signal Received - 100.2 FM";
        }

    </script>

</body>

</html>
